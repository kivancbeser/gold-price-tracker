name: 🥇 Daily Gold Price Scraper

on:
  schedule:
    # Her gün saat 09:00 Istanbul (UTC+3 = UTC 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch:   # Manuel tetikleme butonu (GitHub'dan istediğinde çalıştır)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # Commit + push için gerekli

    steps:
      # ── 1. Repo'yu çek ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python kur ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. pip paketlerini cache'le ────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Bağımlılıkları yükle ───────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Playwright Chromium'u cache'le ─────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      # ── 6. Playwright + sistem bağımlılıklarını yükle ─────────────────────
      - name: Install Playwright Chromium + system deps
        run: python -m playwright install chromium --with-deps

      # ── 7. Scraper'ı çalıştır, HTML çıktısı üret ─────────────────────────
      - name: Run scraper
        run: python gold_scraper_pro.py --html
        env:
          PYTHONUNBUFFERED: "1"

      # ── 8. Sonuçları commit et ve push'la ─────────────────────────────────
      - name: Commit & push HTML output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Eğer değişiklik yoksa commit atma
          git diff --staged --quiet && echo "No changes to commit." || \
          git commit -m "🥇 Fiyat güncellemesi: $(TZ='Europe/Istanbul' date '+%d.%m.%Y %H:%M')" && \
          git push
